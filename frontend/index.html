<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnDesk - Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <!-- InnDesk Logo SVG -->
                <svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
                    <rect x="10" y="15" width="30" height="30" rx="4" fill="currentColor" opacity="0.2"/>
                    <rect x="15" y="20" width="20" height="20" rx="2" fill="currentColor" opacity="0.4"/>
                    <rect x="20" y="25" width="10" height="10" rx="1" fill="currentColor"/>
                    <text x="55" y="25" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="currentColor">Inn</text>
                    <text x="55" y="42" font-family="Inter, sans-serif" font-size="18" font-weight="300" fill="currentColor">Desk</text>
                </svg>
                
                <h1 class="login-title">Système de Gestion Hôtelière</h1>
                <p class="login-subtitle">Connectez-vous à votre espace</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email" class="form-label">Adresse e-mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="votre.email@hotel.fr"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Mot de passe</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                    >
                </div>
                
                <div id="errorMessage" class="form-error" style="display: none; margin-bottom: 16px;"></div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;" id="loginButton">
                    <span id="loginButtonText">Se connecter</span>
                    <span id="loginButtonLoader" style="display: none;">
                        <i data-lucide="loader-2" style="width: 16px; height: 16px; animation: spin 1s linear infinite;"></i>
                        Connexion...
                    </span>
                </button>
            </form>
            
        </div>
    </div>

    <script src="./assets/app.js"></script>
    <script>
        (async function() {
            // Redirect if already authenticated
            if (localStorage.getItem('inndesk_token')) {
                window.location.href = '/app/dashboard.html';
                return;
            }

            // Get DOM elements
            const loginForm = document.getElementById('loginForm');
            const errorMessage = document.getElementById('errorMessage');
            const loginButton = document.getElementById('loginButton');
            const loginButtonText = document.getElementById('loginButtonText');
            const loginButtonLoader = document.getElementById('loginButtonLoader');

            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
            }

            // Attach submit listener
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Clear previous errors
                errorMessage.style.display = 'none';
                
                // Get form data
                const formData = new FormData(loginForm);
                const email = formData.get('email');
                const password = formData.get('password');
                
                // Basic validation
                if (!email || !email.trim()) {
                    showError('L\'adresse e-mail est requise');
                    return;
                }
                
                if (!password || !password.trim()) {
                    showError('Le mot de passe est requis');
                    return;
                }
                
                // Show loading state
                loginButton.disabled = true;
                loginButtonText.style.display = 'none';
                loginButtonLoader.style.display = 'flex';
                
                try {
                    // Call POST /api/v1/auth/login
                    const response = await fetch('/api/v1/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email: email,
                            password: password
                        })
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({
                            detail: 'Erreur de communication avec le serveur'
                        }));
                        throw new Error(errorData.detail || 'Identifiants incorrects');
                    }
                    
                    const loginData = await response.json();
                    
                    // Store token
                    localStorage.setItem('inndesk_token', loginData.access_token);
                    
                    // Fetch user data
                    const userResponse = await fetch('/api/v1/users/me', {
                        headers: {
                            'Authorization': `Bearer ${loginData.access_token}`
                        }
                    });
                    
                    if (!userResponse.ok) {
                        throw new Error('Erreur lors du chargement des données utilisateur');
                    }
                    
                    const userData = await userResponse.json();
                    
                    // Store user in localStorage
                    localStorage.setItem('inndesk_user', JSON.stringify(userData));
                    
                    // Redirect to dashboard
                    window.location.href = '/app/dashboard.html';
                    
                } catch (error) {
                    // Show error message
                    showError(error.message || 'Identifiants incorrects');
                    
                    // Reset form state
                    loginButton.disabled = false;
                    loginButtonText.style.display = 'inline';
                    loginButtonLoader.style.display = 'none';
                    
                    // Clear password field
                    document.getElementById('password').value = '';
                }
            });

            // Add spinning animation for loader
            const style = document.createElement('style');
            style.textContent = `
                @keyframes spin {
                    from { transform: rotate(0deg); }
                    to { transform: rotate(360deg); }
                }
            `;
            document.head.appendChild(style);
            
            // Initialize Lucide icons
            if (window.lucide && window.lucide.createIcons) {
                window.lucide.createIcons();
            }
        })();
    </script>
</body>
</html>
