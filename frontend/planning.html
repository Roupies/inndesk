<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnDesk - Planning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        .planning-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-6);
            padding: var(--space-4);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
        }

        .planning-navigation {
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }

        .planning-grid {
            display: grid;
            grid-template-columns: 120px repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .planning-cell {
            background: var(--surface);
            padding: var(--space-2);
            min-height: 60px;
            position: relative;
        }

        .planning-header-cell {
            background: var(--bg);
            font-weight: 600;
            font-size: var(--text-sm);
            padding: var(--space-3);
            border-bottom: 2px solid var(--border);
        }

        .planning-room-header {
            background: var(--bg);
            font-weight: 600;
            font-size: var(--text-sm);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: var(--space-3);
        }

        .planning-today {
            background: rgba(26, 95, 122, 0.05);
        }

        .planning-weekend {
            background: rgba(0, 0, 0, 0.02);
        }

        .reservation-bar {
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border-radius: var(--radius-sm);
            padding: var(--space-1);
            font-size: var(--text-xs);
            font-weight: 500;
            color: white;
            display: flex;
            align-items: center;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .reservation-bar:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .reservation-bar.status-confirmed {
            background: var(--color-confirmed);
        }

        .reservation-bar.status-checked-in {
            background: var(--color-checked-in);
        }

        .reservation-bar.status-checked-out {
            background: var(--color-checked-out);
            color: var(--text);
        }

        .room-status-available {
            background: rgba(34, 197, 94, 0.02);
        }

        .room-status-occupied {
            background: rgba(59, 130, 246, 0.02);
        }

        .room-status-maintenance {
            background: rgba(239, 68, 68, 0.1);
        }

        .room-status-dirty {
            background: rgba(249, 115, 22, 0.02);
        }

        .planning-loading {
            display: grid;
            grid-template-columns: 120px repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .planning-skeleton-cell {
            background: var(--surface);
            padding: var(--space-3);
            min-height: 60px;
        }

        @media (max-width: 768px) {
            .planning-grid {
                grid-template-columns: 100px repeat(7, minmax(80px, 1fr));
                font-size: var(--text-xs);
            }
            
            .planning-header {
                flex-direction: column;
                gap: var(--space-3);
            }

            .planning-navigation {
                flex-direction: column;
                width: 100%;
                gap: var(--space-2);
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <a href="/app/dashboard.html" class="nav-logo">InnDesk</a>
            
            <nav class="nav-menu">
                <ul style="list-style: none; padding: 0; margin: 0;">
                    <li class="nav-item">
                        <a href="/app/dashboard.html" class="nav-link">
                            <i data-lucide="layout-dashboard" class="nav-icon"></i>
                            Tableau de bord
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/app/planning.html" class="nav-link active">
                            <i data-lucide="calendar" class="nav-icon"></i>
                            Planning
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/app/rooms.html" class="nav-link">
                            <i data-lucide="bed" class="nav-icon"></i>
                            Chambres
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./reservations.html" class="nav-link">
                            <i data-lucide="calendar-check" class="nav-icon"></i>
                            Réservations
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./clients.html" class="nav-link">
                            <i data-lucide="users" class="nav-icon"></i>
                            Clients
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./housekeeping.html" class="nav-link">
                            <i data-lucide="sparkles" class="nav-icon"></i>
                            Gouvernante
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./invoices.html" class="nav-link">
                            <i data-lucide="file-text" class="nav-icon"></i>
                            Factures
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./settings.html" class="nav-link">
                            <i data-lucide="settings" class="nav-icon"></i>
                            Paramètres
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="nav-user">
                <div class="nav-user-name" id="userName">Chargement...</div>
                <div class="nav-user-role" id="userRole"></div>
                <button class="btn btn-ghost btn-sm" id="logoutButton" style="width: 100%; margin-top: 8px;">
                    <i data-lucide="log-out" style="width: 14px; height: 14px; margin-right: 6px;"></i>
                    Déconnexion
                </button>
            </div>
        </div>

        <!-- Topbar -->
        <div class="topbar">
            <div>
                <h1 style="font-size: var(--text-lg); font-weight: 600; margin: 0;">Planning</h1>
                <p style="font-size: var(--text-sm); color: var(--text-secondary); margin: 0;">Vue Gantt des réservations</p>
            </div>
            
            <button class="theme-toggle" id="themeToggle" aria-label="Changer de thème">
                <i data-lucide="sun" id="themeIconLight" style="width: 18px; height: 18px; display: none;"></i>
                <i data-lucide="moon" id="themeIconDark" style="width: 18px; height: 18px;"></i>
            </button>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Planning Header -->
            <div class="planning-header">
                <div class="planning-navigation">
                    <button class="btn btn-outline btn-sm" id="prevWeekBtn">
                        <i data-lucide="chevron-left" style="width: 16px; height: 16px; margin-right: 4px;"></i>
                        Semaine précédente
                    </button>
                    <button class="btn btn-outline btn-sm" id="nextWeekBtn">
                        Semaine suivante
                        <i data-lucide="chevron-right" style="width: 16px; height: 16px; margin-left: 4px;"></i>
                    </button>
                </div>
                
                <h2 id="weekLabel" style="font-weight: 600; margin: 0; text-align: center;">Chargement...</h2>
                
                <button class="btn btn-primary btn-sm" id="todayBtn">
                    <i data-lucide="calendar" style="width: 16px; height: 16px; margin-right: 4px;"></i>
                    Aujourd'hui
                </button>
            </div>

            <!-- Planning Grid -->
            <div id="planningContainer">
                <div class="planning-loading">
                    <div class="planning-skeleton-cell">
                        <div class="skeleton skeleton-text" style="height: 1rem; margin-bottom: 4px;"></div>
                        <div class="skeleton skeleton-text" style="height: 0.8rem; width: 70%;"></div>
                    </div>
                    <div class="planning-skeleton-cell"><div class="skeleton skeleton-text" style="height: 1rem;"></div></div>
                    <div class="planning-skeleton-cell"><div class="skeleton skeleton-text" style="height: 1rem;"></div></div>
                    <div class="planning-skeleton-cell"><div class="skeleton skeleton-text" style="height: 1rem;"></div></div>
                    <div class="planning-skeleton-cell"><div class="skeleton skeleton-text" style="height: 1rem;"></div></div>
                    <div class="planning-skeleton-cell"><div class="skeleton skeleton-text" style="height: 1rem;"></div></div>
                    <div class="planning-skeleton-cell"><div class="skeleton skeleton-text" style="height: 1rem;"></div></div>
                    <div class="planning-skeleton-cell"><div class="skeleton skeleton-text" style="height: 1rem;"></div></div>
                </div>
            </div>
        </main>
    </div>

    <script src="./assets/app.js"></script>
    <script src="./assets/api/auth.js"></script>
    <script src="./assets/api/rooms.js"></script>
    <script src="./assets/api/reservations.js"></script>
    <script src="./assets/api/clients.js"></script>
    <script src="./assets/api/index.js"></script>
    <script src="./assets/js/planning/state.js"></script>
    <script src="./assets/js/planning/utils.js"></script>
    <script src="./assets/js/planning/render.js"></script>
    <script src="./assets/js/planning/handlers.js"></script>
    <script src="./assets/js/planning/init.js"></script>
</body>
</html>
