<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnDesk - Gouvernante</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        .floor-section {
            margin-bottom: var(--space-8);
        }

        .floor-title {
            font-size: var(--text-lg);
            font-weight: 600;
            margin: 0 0 var(--space-4) 0;
            color: var(--text);
            padding: var(--space-3) 0;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .floor-title i {
            color: var(--primary);
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--space-4);
            margin-top: var(--space-4);
        }

        .room-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }

        .room-card.status-available {
            border-left-color: var(--color-available);
        }

        .room-card.status-occupied {
            border-left-color: var(--color-occupied);
        }

        .room-card.status-dirty {
            border-left-color: var(--color-dirty);
        }

        .room-card.status-cleaning {
            border-left-color: var(--color-cleaning);
        }

        .room-card.status-maintenance {
            border-left-color: var(--color-maintenance);
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--space-3);
        }

        .room-number {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--text);
        }

        .room-info {
            display: flex;
            flex-direction: column;
            gap: var(--space-1);
            margin-bottom: var(--space-4);
        }

        .room-type {
            font-size: var(--text-sm);
            color: var(--text-muted);
            font-weight: 500;
        }

        .status-controls {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
        }

        .status-btn {
            padding: var(--space-2) var(--space-3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text);
            font-size: var(--text-sm);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: var(--space-1);
        }

        .status-btn:hover {
            background: var(--bg);
        }

        .status-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .status-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-btn.available {
            border-color: var(--color-available);
            color: var(--color-available);
        }

        .status-btn.available:hover:not(:disabled) {
            background: var(--color-available);
            color: white;
        }

        .status-btn.dirty {
            border-color: var(--color-dirty);
            color: var(--color-dirty);
        }

        .status-btn.dirty:hover:not(:disabled) {
            background: var(--color-dirty);
            color: white;
        }

        .status-btn.cleaning {
            border-color: var(--color-cleaning);
            color: var(--color-cleaning);
        }

        .status-btn.cleaning:hover:not(:disabled) {
            background: var(--color-cleaning);
            color: white;
        }

        .status-btn.maintenance {
            border-color: var(--color-maintenance);
            color: var(--color-maintenance);
        }

        .status-btn.maintenance:hover:not(:disabled) {
            background: var(--color-maintenance);
            color: white;
        }

        .toast {
            position: fixed;
            top: var(--space-4);
            right: var(--space-4);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            max-width: 400px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left: 4px solid var(--color-available);
        }

        .toast.error {
            border-left: 4px solid var(--color-maintenance);
        }

        .skeleton {
            background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-text {
            height: 1rem;
            border-radius: var(--radius-sm);
        }

        .assignment-bar {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-top: var(--space-3);
            flex-wrap: wrap;
        }

        .assignment-label {
            font-size: var(--text-sm);
            color: var(--text-muted);
            white-space: nowrap;
        }

        .assignment-select {
            font-size: var(--text-sm);
            padding: var(--space-1) var(--space-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            flex: 1;
            min-width: 0;
        }

        .assignment-chip {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            background: var(--color-primary-light, #e8f4f8);
            color: var(--color-primary, #1a5f7a);
            border-radius: var(--radius-sm);
            padding: var(--space-1) var(--space-2);
            font-size: var(--text-sm);
            font-weight: 500;
        }

        .assignment-chip-remove {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            color: inherit;
            opacity: 0.7;
            display: flex;
            align-items: center;
        }

        .assignment-chip-remove:hover {
            opacity: 1;
        }

        .assign-filter-bar {
            display: flex;
            gap: var(--space-2);
            margin-bottom: var(--space-6);
            flex-wrap: wrap;
        }

        .assign-filter-btn {
            padding: var(--space-2) var(--space-4);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text);
            font-size: var(--text-sm);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .assign-filter-btn:hover {
            background: var(--bg);
        }

        .assign-filter-btn.active {
            background: var(--color-primary, #1a5f7a);
            border-color: var(--color-primary, #1a5f7a);
            color: white;
        }

        @media (max-width: 768px) {
            .rooms-grid {
                grid-template-columns: 1fr;
            }

            .status-controls {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <a href="/app/dashboard.html" class="nav-logo">InnDesk</a>
            
            <nav class="nav-menu">
                <ul style="list-style: none; padding: 0; margin: 0;">
                    <li class="nav-item">
                        <a href="/app/dashboard.html" class="nav-link">
                            <i data-lucide="layout-dashboard" class="nav-icon"></i>
                            Tableau de bord
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/app/planning.html" class="nav-link">
                            <i data-lucide="calendar" class="nav-icon"></i>
                            Planning
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/app/rooms.html" class="nav-link">
                            <i data-lucide="bed" class="nav-icon"></i>
                            Chambres
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./reservations.html" class="nav-link">
                            <i data-lucide="calendar-check" class="nav-icon"></i>
                            Réservations
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./clients.html" class="nav-link">
                            <i data-lucide="users" class="nav-icon"></i>
                            Clients
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./housekeeping.html" class="nav-link active">
                            <i data-lucide="sparkles" class="nav-icon"></i>
                            Gouvernante
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./invoices.html" class="nav-link">
                            <i data-lucide="file-text" class="nav-icon"></i>
                            Factures
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="./settings.html" class="nav-link">
                            <i data-lucide="settings" class="nav-icon"></i>
                            Paramètres
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="nav-user">
                <div class="nav-user-name" id="userName">Chargement...</div>
                <div class="nav-user-role" id="userRole"></div>
                <button class="btn btn-ghost btn-sm" id="logoutButton" style="width: 100%; margin-top: 8px;">
                    <i data-lucide="log-out" style="width: 14px; height: 14px; margin-right: 6px;"></i>
                    Déconnexion
                </button>
            </div>
        </div>

        <!-- Topbar -->
        <div class="topbar">
            <div>
                <h1 style="font-size: var(--text-lg); font-weight: 600; margin: 0;">Gouvernante</h1>
                <p style="font-size: var(--text-sm); color: var(--text-secondary); margin: 0;">Gestion du statut des chambres</p>
            </div>
            
            <button class="theme-toggle" id="themeToggle" aria-label="Changer de thème">
                <i data-lucide="sun" id="themeIconLight" style="width: 18px; height: 18px; display: none;"></i>
                <i data-lucide="moon" id="themeIconDark" style="width: 18px; height: 18px;"></i>
            </button>
        </div>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <!-- Loading skeleton -->
            <div id="loadingSkeleton">
                <div class="floor-section">
                    <div class="skeleton skeleton-text" style="width: 200px; height: 1.5rem; margin-bottom: var(--space-4);"></div>
                    <div class="rooms-grid">
                        <div class="room-card">
                            <div class="room-header">
                                <div class="skeleton skeleton-text" style="width: 80px; height: 1.5rem;"></div>
                                <div class="skeleton skeleton-text" style="width: 60px; height: 1rem;"></div>
                            </div>
                            <div class="room-info">
                                <div class="skeleton skeleton-text" style="width: 100px; height: 0.9rem;"></div>
                            </div>
                            <div class="skeleton skeleton-text" style="width: 200px; height: 2rem;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Assignment filter bar -->
            <div class="assign-filter-bar" id="assignFilterBar" style="display: none;">
                <button class="assign-filter-btn active" data-filter="all">Toutes</button>
                <button class="assign-filter-btn" data-filter="unassigned">Non assignées</button>
                <button class="assign-filter-btn" data-filter="assigned">Assignées</button>
            </div>

            <!-- Content will be populated by JavaScript -->
            <div id="housekeepingContent" style="display: none;"></div>
        </main>
    </div>

    <!-- Toast notifications -->
    <div id="toastContainer"></div>

    <script src="./assets/app.js"></script>
    <script src="./assets/api/auth.js"></script>
    <script src="./assets/api/housekeeping.js"></script>
    <script src="./assets/api/index.js"></script>
    <script src="./assets/js/housekeeping/state.js"></script>
    <script src="./assets/js/housekeeping/render.js"></script>
    <script src="./assets/js/housekeeping/handlers.js"></script>
    <script src="./assets/js/housekeeping/init.js"></script>
</body>
</html>
