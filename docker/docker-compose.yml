# docker-compose.yml — Environnement InnDesk
# Reconstitue localement un environnement conforme à la production :
# base PostgreSQL conteneurisée + application FastAPI.
# Usage : docker compose up -d

services:
  db:
    image: postgres:15-alpine
    container_name: inndesk-db
    environment:
      POSTGRES_DB: inndesk
      POSTGRES_USER: inndesk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?definir POSTGRES_PASSWORD dans .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inndesk -d inndesk"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: inndesk-app
    env_file: .env
    environment:
      DATABASE_URL: postgresql://inndesk:${POSTGRES_PASSWORD}@db:5432/inndesk
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

volumes:
  pgdata:
