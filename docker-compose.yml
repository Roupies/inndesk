services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: inndesk
      POSTGRES_USER: inndesk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inndesk"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://inndesk:${POSTGRES_PASSWORD}@db:5432/inndesk
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_HOURS: ${ACCESS_TOKEN_EXPIRE_HOURS:-8}
      HOTEL_NAME: ${HOTEL_NAME:-Hôtel de la Paix}
      HOTEL_ADDRESS: ${HOTEL_ADDRESS:-12 Rue de Rivoli, 75001 Paris}
      HOTEL_SIRET: ${HOTEL_SIRET:-123 456 789 00012}
      HOTEL_EMAIL: ${HOTEL_EMAIL:-contact@hotel-de-la-paix.fr}
      HOTEL_PHONE: ${HOTEL_PHONE:-+33 1 42 00 00 00}
      RESEND_API_KEY: ${RESEND_API_KEY:-your_resend_api_key_here}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-factures@hotel-de-la-paix.fr}
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
